spring.application.name=${SPRING_APPLICATION_NAME:banquito-file-reception-service}
spring.config.import=${SPRING_CONFIG_IMPORT:optional:file:.env[.properties]}
server.port=${SERVER_PORT:8084}

app.file-reception.duplicate-window-days=${APP_DUPLICATE_WINDOW_DAYS:30}
app.file-reception.file-delimiter=${APP_FILE_DELIMITER:,}
app.file-reception.payment-line-transport=${APP_PAYMENT_LINE_TRANSPORT:kafka}
app.file-reception.kafka-enabled=${APP_KAFKA_ENABLED:true}
app.file-reception.kafka-topic=${APP_KAFKA_TOPIC:payment-lines}
app.file-reception.grpc-host=${APP_GRPC_HOST:localhost}
app.file-reception.grpc-port=${APP_GRPC_PORT:9090}
app.file-reception.grpc-deadline-seconds=${APP_GRPC_DEADLINE_SECONDS:10}
app.file-reception.cutoff-hour=${APP_CUTOFF_HOUR:18}
app.file-reception.core-base-url=${CORE_BASE_URL:http://localhost:8080}
app.file-reception.core-holiday-endpoint=${CORE_HOLIDAY_ENDPOINT:/api/v2/calendar/holidays/check}
app.file-reception.core-account-validation-endpoint=${CORE_ACCOUNT_VALIDATION_ENDPOINT:/api/v1/accounts/validate}
app.file-reception.core-favorite-account-endpoint=${CORE_FAVORITE_ACCOUNT_ENDPOINT:/api/v2/accounts/customer/{customerId}/favorite}
app.file-reception.core-mass-payment-service-endpoint=${CORE_MASS_PAYMENT_SERVICE_ENDPOINT:/api/v1/customers/mass-payments/active}
app.file-reception.core-validation-enabled=${APP_CORE_VALIDATION_ENABLED:true}
app.file-reception.force-business-day=${APP_FORCE_BUSINESS_DAY:false}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/filedb?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/file_reception}
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/file_reception}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:org.apache.kafka.common.security.plain.PlainLoginModule required username="" password="";}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
management.endpoint.health.probes.enabled=${MANAGEMENT_HEALTH_PROBES_ENABLED:true}
management.health.kafka.enabled=${MANAGEMENT_HEALTH_KAFKA_ENABLED:false}
