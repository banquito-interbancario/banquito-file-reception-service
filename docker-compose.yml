services:
  postgres:
    image: postgres:16-alpine
    container_name: banquito-postgres
    environment:
      POSTGRES_DB: file_reception
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_reception"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: banquito-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  file-reception-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: banquito-file-reception-service:local
    container_name: banquito-file-reception-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: file_reception
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_AUTO_CREATE_DB: "true"
      POSTGRES_MAINTENANCE_DB: postgres
      MONGO_URI: mongodb://mongo:27017/file_reception
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/file_reception
      SPRING_MONGODB_URI: mongodb://mongo:27017/file_reception
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SASL_JAAS_CONFIG: ${KAFKA_SASL_JAAS_CONFIG}
      APP_PAYMENT_LINE_TRANSPORT: kafka
      APP_KAFKA_ENABLED: "true"
      APP_KAFKA_TOPIC: payment-lines
      APP_GRPC_HOST: payment-line-processor
      APP_GRPC_PORT: "9090"
      APP_GRPC_DEADLINE_SECONDS: "10"
      MANAGEMENT_HEALTH_KAFKA_ENABLED: "true"
      APP_CORE_VALIDATION_ENABLED: "false"
      JPA_DDL_AUTO: update
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  mongo_data:
